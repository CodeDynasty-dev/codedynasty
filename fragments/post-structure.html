<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}} - CodeDynasty</title>
    <link rel="stylesheet" href="/bundle.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/post.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css"
    />
    <meta name="description" content="{{ description }}" />
    <meta name="keywords" content="code, programming, development" />
    <meta name="author" content="{{ author }}" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="{{ title }}" />
    <meta property="og:description" content="{{ description }}" />
    <meta property="og:url" content="https://codedynasty.dev" />
    <meta property="og:image" content="https://codedynasty.dev{{ image }}" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="CodeDynasty" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ title }}" />
    <meta name="twitter:description" content="{{ description }}" />
    <meta name="twitter:image" content="https://codedynasty.dev{{ image }}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
      .katex-display,
      .katex,
      .katex-mathml,
      .katex-html {
        display: inline !important;
      }
    </style>
  </head>
  <body>
    <header class="nav-minimal fixed top-0 left-0 z-50" style="height: 72px;">
      <div class="container-max" style="display: flex; justify-content: space-between; align-items: center; width: 100%; height: 100%;">
        <a href="/" style="display: flex; align-items: center; gap: 12px;" aria-label="CodeDynasty Home">
          <div style="width: 40px; height: 40px;">
            <img
              src="/logo.png"
              style="width: 100%; height: 100%; object-fit: cover; border-radius: 11px;"
              alt="CodeDynasty Logo"
            />
          </div>
          <span style="font-family: var(--font-control); font-weight: 500; font-size: 20px; line-height: 1.1; color: var(--color-whiteout);">CodeDynasty</span>
        </a>

        <button
          id="mobile-menu-button"
          style="background: none; border: none; color: var(--color-whiteout); cursor: pointer; display: none;"
          aria-label="Toggle menu"
        >
          <svg style="width: 24px; height: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
          </svg>
        </button>

        <nav style="display: flex; align-items: center; gap: var(--spacing-16);">
          <a href="/blog.html" class="nav-link">Blog</a>
          <a href="https://discord.codedynasty.dev" class="nav-link">Discord</a>
          <a href="https://github.com/CodeDynasty-dev" class="nav-link" target="_blank">GitHub</a>
          <a href="/contact.html" class="btn-ghost-nav">Contact</a>
        </nav>
      </div>
    </header>

    <div
      id="mobile-menu"
      style="position: fixed; inset: 0; z-index: 50; background-color: var(--surface-dark-canvas); opacity: 0.95; transform: translateX(-100%); transition: transform 0.3s ease; display: none;"
    >
      <div class="container-max" style="padding-top: var(--spacing-32); padding-bottom: var(--spacing-32); height: 100%; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-48);">
          <a href="/" style="display: flex; align-items: center; gap: 12px;" aria-label="CodeDynasty Home">
            <div style="width: 40px; height: 40px;">
              <img src="/logo.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-lg);" alt="CodeDynasty Logo" />
            </div>
            <span style="font-family: var(--font-control); font-weight: 500; font-size: 20px; line-height: 1.1; color: var(--color-whiteout);">CodeDynasty</span>
          </a>
          <button id="close-mobile-menu" style="background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;">
            <svg style="width: 24px; height: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <nav style="flex: 1; display: flex; flex-direction: column; gap: var(--spacing-16);">
          <a href="https://discord.codedynasty.dev" style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); transition: background-color 0.2s ease;">Discord</a>
          <a href="https://github.com/CodeDynasty-dev" target="_blank" style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); transition: background-color 0.2s ease;">GitHub</a>
          <a href="/contact.html" style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); transition: background-color 0.2s ease;">Contact</a>
        </nav>
        <div style="padding-top: var(--spacing-24); border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
          <p style="font-family: var(--font-control); font-weight: 500; font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255,255,255,0.5); text-align: center;">&copy; 2025 CodeDynasty. All rights reserved.</p>
        </div>
      </div>
    </div>

    <main style="padding-top: 72px; padding-bottom: var(--spacing-48);">
      <div class="reading-progress-container">
        <div class="reading-progress-bar" style="width: 0%"></div>
      </div>

      <section class="post-header">
        <div class="container-max">
          <div style="max-width: 880px; margin: 0 auto;">
            <div style="margin-bottom: var(--spacing-24);">
              <span class="post-topic-badge">{{ topic }}</span>
            </div>

            <h1 style="font-family: var(--font-control-tnt); font-weight: 500; font-size: var(--text-heading-lg); line-height: var(--leading-heading-lg); color: var(--color-whiteout); margin-bottom: var(--spacing-24);">
              {{ title }}
            </h1>

            <div class="post-meta" style="display: flex; flex-wrap: wrap; align-items: center; gap: var(--spacing-24);">
              <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 48px; height: 48px; border-radius: 9999px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); padding: 2px;">
                  <div style="width: 100%; height: 100%; border-radius: 9999px; overflow: hidden; background-color: var(--color-ink);">
                    <img
                      src="{{ author_img }}"
                      alt="{{ author }}"
                      style="width: 100%; height: 100%; object-fit: cover;"
                    />
                  </div>
                </div>
                <div>
                  <span style="display: block; font-family: var(--font-control); font-weight: 500; font-size: var(--text-body); line-height: var(--leading-body); color: var(--color-whiteout);">{{ author }}</span>
                  <span style="font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255,255,255,0.3);">{{ author_title }}</span>
                </div>
              </div>

              <div style="display: flex; align-items: center; gap: var(--spacing-16);">
                <div style="display: flex; align-items: center; gap: var(--spacing-8);">
                  <svg style="width: 16px; height: 16px; color: rgba(255,255,255,0.3);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  <time datetime="{{ time_created }}" style="font-family: var(--font-control); font-weight: 500; font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255,255,255,0.3);">{{ time_created }}</time>
                </div>
                <div style="display: flex; align-items: center; gap: var(--spacing-8);">
                  <svg style="width: 16px; height: 16px; color: rgba(255,255,255,0.3);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  <span style="font-family: var(--font-control); font-weight: 500; font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255,255,255,0.3);">{{ time_to_read }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section style="margin-bottom: var(--spacing-64);">
        <div class="container-max">
          <div style="max-width: 1040px; margin: 0 auto;">
            <div style="aspect-ratio: 16 / 9; overflow: hidden; border-radius: var(--radius-images);">
              <img
                src="{{ image }}"
                alt="{{ title }}"
                style="width: 100%; height: 100%; object-fit: cover;"
              />
            </div>
          </div>
        </div>
      </section>

      <div class="container-max">
        <div style="display: flex; gap: var(--spacing-48); max-width: 1248px; margin: 0 auto;">
          <aside class="share-sidebar" style="position: sticky; top: 104px; align-self: flex-start; width: 80px; flex-shrink: 0;">
            <span class="share-label">SHARE</span>
            <a href="#" class="share-btn" aria-label="Share on Twitter">
              <i class="fab fa-twitter"></i>
            </a>
            <a href="#" class="share-btn" aria-label="Share on LinkedIn">
              <i class="fab fa-linkedin"></i>
            </a>
            <a href="#" class="share-btn" aria-label="Share on Facebook">
              <i class="fab fa-facebook"></i>
            </a>
            <a href="#" class="share-btn copy-link-button" data-tooltip="Copy Link" aria-label="Copy link">
              <i class="fas fa-link"></i>
            </a>
          </aside>

          <article class="prose" style="flex: 1; max-width: 880px; min-width: 0;">
            {{ content }}

            <div style="margin-top: var(--spacing-64); padding-top: var(--spacing-64); border-top: 1px solid rgba(255,255,255,0.1);">
              <script
                src="https://giscus.app/client.js"
                data-repo="codedynasty-dev/codedynasty"
                data-repo-id="R_kgDOOBViSg"
                data-category="Ideas"
                data-category-id="DIC_kwDOOBViSs4CqU7E"
                data-mapping="pathname"
                data-strict="1"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="top"
                data-theme="noborder_dark"
                data-lang="en"
                data-loading="lazy"
                crossorigin="anonymous"
                async
              ></script>
            </div>
          </article>
        </div>
      </div>

      <div style="position: fixed; bottom: var(--spacing-24); right: var(--spacing-24); z-index: 40; display: flex; flex-direction: column; gap: 12px;">
        <button
          id="mobile-share-button"
          class="btn-solid-light"
          style="width: 56px; height: 56px; border-radius: var(--radius-buttons); padding: 0;"
        >
          <i class="fas fa-share-alt"></i>
        </button>
        <a href="#" id="scroll-top">
          <button
            class="btn-ghost-nav"
            style="width: 56px; height: 56px; border-radius: var(--radius-buttons); padding: 0;"
          >
            <i class="fas fa-arrow-up"></i>
          </button>
        </a>
      </div>
    </main>

    <footer class="footer-section" style="padding-top: var(--spacing-48); padding-bottom: var(--spacing-48);">
      <div class="container-max" style="text-align: center;">
        <p style="font-family: var(--font-control); font-weight: 500; font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255, 255, 255, 0.3);">
          &copy; 2025 CodeDynasty. Building modern software for humanity.
        </p>
      </div>
    </footer>

    <script src="/script/index.js"></script>
    <script>
      const mobileMenuButton = document.getElementById("mobile-menu-button");
      const closeMobileMenu = document.getElementById("close-mobile-menu");
      const mobileMenu = document.getElementById("mobile-menu");
      const body = document.body;

      function toggleMobileMenu() {
        if (mobileMenu.style.transform === "translateX(0%)") {
          mobileMenu.style.transform = "translateX(-100%)";
        } else {
          mobileMenu.style.transform = "translateX(0%)";
        }
        body.style.overflow = body.style.overflow === "hidden" ? "" : "hidden";
      }

      if (mobileMenuButton && closeMobileMenu && mobileMenu) {
        mobileMenuButton.addEventListener("click", toggleMobileMenu);
        closeMobileMenu.addEventListener("click", toggleMobileMenu);
        document.querySelectorAll("#mobile-menu a").forEach(function(link) {
          link.addEventListener("click", function() {
            mobileMenu.style.transform = "translateX(-100%)";
            body.style.overflow = "";
          });
        });
        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape" && mobileMenu.style.transform === "translateX(0%)") {
            toggleMobileMenu();
          }
        });
      }

      window.addEventListener("scroll", function() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = (winScroll / height) * 100;
        var progressBar = document.querySelector(".reading-progress-bar");
        if (progressBar) {
          progressBar.style.width = scrolled + "%";
        }
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        renderMathInElement(document.body, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
        });
      });
    </script>
  </body>
</html>

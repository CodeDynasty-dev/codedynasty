<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CODEDYNASTY - {{title}}</title>
  <link rel="stylesheet" href="/bundle.css" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/post.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <meta name="description" content="{{ description }}" />
  <style>
    .overflow-hidden { overflow: hidden; }

    .nav-desktop { display: none; }
    .nav-mobile { display: block; }
    .nav-full { display: none; }

    .mobile-menu-closed { transform: translateX(-100%); }
    .mobile-menu-open { transform: translateX(0); }

    @media (min-width: 768px) {
      .nav-desktop { display: flex; }
      .nav-mobile { display: none; }
    }

    @media (min-width: 1024px) {
      .nav-full { display: inline-flex; }
    }

    @media (max-width: 767px) {
      .header-pad { padding: 16px 20px !important; }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .header-pad { padding: 20px 28px !important; }
    }

    @media (min-width: 1024px) {
      .header-pad { padding: 32px 40px !important; }
    }
  </style>
</head>

<body>
  <header class="header-pad"
    style="position: fixed; width: 100%; top: 0; z-index: 50; padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;">
    <a href="/" aria-label="CodeDynasty Home"
      style="display: flex; align-items: center; text-decoration: none; color: inherit;">
      <span
        style="font-family: 'Caveat', cursive; font-size: clamp(22px, 3vw, 26px); font-weight: 400; font-style: italic; color: var(--color-whiteout); letter-spacing: -0.01em; white-space: nowrap;">CodeDynasty</span>
    </a>

    <nav class="nav-desktop" style="align-items: center; gap: 2px;">
      <a href="/blog.html"
        style="font-family: var(--font-control); font-weight: 500; font-size: 13px; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); text-decoration: none; padding: 6px 10px; border-radius: var(--radius-md); transition: color 0.2s ease; white-space: nowrap;"
        onmouseover="this.style.color='var(--color-whiteout)'"
        onmouseout="this.style.color='rgba(255,255,255,0.55)'">Blog</a>
      <a href="https://discord.codedynasty.dev"
        style="font-family: var(--font-control); font-weight: 500; font-size: 13px; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); text-decoration: none; padding: 6px 10px; border-radius: var(--radius-md); transition: color 0.2s ease; white-space: nowrap;"
        onmouseover="this.style.color='var(--color-whiteout)'"
        onmouseout="this.style.color='rgba(255,255,255,0.55)'">Discord</a>
      <a href="https://github.com/CodeDynasty-dev" target="_blank"
        style="font-family: var(--font-control); font-weight: 500; font-size: 13px; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); text-decoration: none; padding: 6px 10px; border-radius: var(--radius-md); transition: color 0.2s ease; white-space: nowrap;"
        onmouseover="this.style.color='var(--color-whiteout)'"
        onmouseout="this.style.color='rgba(255,255,255,0.55)'">GitHub</a>
      <a href="/contact.html"
        style="font-family: var(--font-control); font-weight: 500; font-size: 13px; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); text-decoration: none; padding: 6px 10px; border-radius: var(--radius-md); transition: color 0.2s ease; white-space: nowrap;"
        onmouseover="this.style.color='var(--color-whiteout)'"
        onmouseout="this.style.color='rgba(255,255,255,0.55)'">Contact</a>
    </nav>

    <a href="https://github.com/CodeDynasty-dev" target="_blank" class="nav-full"
      style="align-items: center; justify-content: center; background: transparent; border: 1px solid var(--color-whiteout); color: var(--color-whiteout); border-radius: var(--radius-buttons); font-family: var(--font-control); font-weight: 500; font-size: 13px; letter-spacing: 0.12em; padding: 10px 16px; text-decoration: none; transition: background-color 0.2s ease; white-space: nowrap;"
      onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'"
      onmouseout="this.style.backgroundColor='transparent'">Explore Projects</a>

    <button id="mobile-menu-button" class="nav-mobile" aria-label="Toggle menu"
      style="background: none; border: none; color: #fff; cursor: pointer; padding: 8px;">
      <svg style="width: 24px; height: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
    </button>
  </header>

  <div id="mobile-menu" class="mobile-menu-closed"
    style="position: fixed; inset: 0; z-index: 50; background-color: rgba(0,0,0,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: transform 0.3s ease;">
    <div
      style="padding: var(--spacing-32) var(--spacing-24); height: 100%; display: flex; flex-direction: column; max-width: var(--page-max-width); margin: 0 auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-48);">
        <a href="/" aria-label="CodeDynasty Home"
          style="display: flex; align-items: center; text-decoration: none; color: inherit;">
          <span
            style="font-family: 'Caveat', cursive; font-size: 26px; font-weight: 400; font-style: italic; color: var(--color-whiteout); letter-spacing: -0.01em;">CodeDynasty</span>
        </a>
        <button id="close-mobile-menu"
          style="background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;">
          <svg style="width: 24px; height: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <nav style="flex: 1; display: flex; flex-direction: column; gap: var(--spacing-16);">
        <a href="/blog.html"
          style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); text-decoration: none; transition: background-color 0.2s ease;">Blog</a>
        <a href="https://discord.codedynasty.dev"
          style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); text-decoration: none; transition: background-color 0.2s ease;">Discord</a>
        <a href="https://github.com/CodeDynasty-dev" target="_blank"
          style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); text-decoration: none; transition: background-color 0.2s ease;">GitHub</a>
        <a href="/contact.html"
          style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); text-decoration: none; transition: background-color 0.2s ease;">Contact</a>
        <a href="https://github.com/CodeDynasty-dev" target="_blank"
          style="font-family: var(--font-control); font-weight: 500; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,0.8); padding: 12px 16px; border-radius: var(--radius-lg); text-decoration: none; transition: background-color 0.2s ease;">Explore Projects</a>
      </nav>
      <div style="padding-top: var(--spacing-24); border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
        <p
          style="font-family: var(--font-control); font-weight: 500; font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255,255,255,0.5); text-align: center;">
          &copy; 2025 CodeDynasty. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var menuBtn = document.getElementById("mobile-menu-button");
      var closeBtn = document.getElementById("close-mobile-menu");
      var menu = document.getElementById("mobile-menu");
      var body = document.body;

      function openMenu() {
        menu.classList.remove("mobile-menu-closed");
        menu.classList.add("mobile-menu-open");
        body.classList.add("overflow-hidden");
      }
      function closeMenu() {
        menu.classList.remove("mobile-menu-open");
        menu.classList.add("mobile-menu-closed");
        body.classList.remove("overflow-hidden");
      }
      function toggleMenu() {
        if (menu.classList.contains("mobile-menu-open")) closeMenu();
        else openMenu();
      }

      if (menuBtn && closeBtn && menu) {
        menuBtn.addEventListener("click", toggleMenu);
        closeBtn.addEventListener("click", toggleMenu);
        document.querySelectorAll("#mobile-menu a").forEach(function (link) {
          link.addEventListener("click", closeMenu);
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && menu.classList.contains("mobile-menu-open")) toggleMenu();
        });
      }
    })();
  </script>

  <main style="padding-top: 88px; padding-bottom: var(--spacing-48);">
    <div class="container-max">
      <article class="prose" style="max-width: 880px; margin: 0 auto;">
        {{ content }}
      </article>
    </div>
  </main>

  <footer class="footer-section" style="padding-top: var(--spacing-48); padding-bottom: var(--spacing-48);">
    <div class="container-max" style="text-align: center;">
      <p
        style="font-family: var(--font-control); font-weight: 500; font-size: var(--text-caption); line-height: var(--leading-caption); color: rgba(255, 255, 255, 0.3);">
        &copy; 2025 CodeDynasty. Building modern software for humanity.
      </p>
    </div>
  </footer>
  <script src="/script/index.js"></script>
</body>

</html>
